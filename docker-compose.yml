version: "3.9"

services:
  app:
    build: .
    ports:
      - "8000:8000"
    env_file: .env
    environment:
      - POSTGRES_DSN=postgresql+asyncpg://alignwell:alignwell@postgres:5432/alignwell
      - QDRANT_URL=http://qdrant:6333
      - LANGCHAIN_TRACING_V2=false
    depends_on:
      postgres:
        condition: service_healthy
      qdrant:
        condition: service_started
    volumes:
      - .:/app
    command: uvicorn api.main:app --host 0.0.0.0 --port 8000 --reload

  qdrant:
    image: qdrant/qdrant:latest
    ports:
      - "6333:6333"
    volumes:
      - qdrant_data:/qdrant/storage

  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: alignwell
      POSTGRES_PASSWORD: alignwell
      POSTGRES_DB: alignwell
    ports:
      - "5432:5432"
    volumes:
      - pg_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U alignwell -d alignwell"]
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  qdrant_data:
  pg_data:
